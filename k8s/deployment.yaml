# ============================================================
# ShopFlow - Kubernetes Deployment
# Run: kubectl apply -f k8s/deployment.yaml
# ============================================================

# --- MySQL Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "ShopFlow@123"
            - name: MYSQL_DATABASE
              value: "shopflow"
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-uroot", "-pShopFlow@123"]
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
---
# --- MySQL ClusterIP Service (only reachable inside cluster) ---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306

---
# --- ShopFlow App Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopflow-app
  labels:
    app: shopflow-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopflow-app
  template:
    metadata:
      labels:
        app: shopflow-app
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox
          command: ["sh", "-c", "until nc -z mysql-service 3306; do echo waiting for mysql; sleep 5; done"]
      containers:
        - name: shopflow-app
          image: shopflow:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9090
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-service:3306/shopflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "ShopFlow@123"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5

---
# --- ShopFlow NodePort Service (accessible from your browser) ---
apiVersion: v1
kind: Service
metadata:
  name: shopflow-service
spec:
  selector:
    app: shopflow-app
  type: NodePort
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
