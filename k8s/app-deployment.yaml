apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopflow-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopflow-app
  template:
    metadata:
      labels:
        app: shopflow-app
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox
          command: ["sh", "-c", "until nc -z mysql-service 3306; do echo waiting for mysql; sleep 5; done"]
      containers:
        - name: shopflow-app
          image: shopflow:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9090
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-service:3306/shopflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "ShopFlow@123"
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shopflow-service
spec:
  selector:
    app: shopflow-app
  type: NodePort
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
