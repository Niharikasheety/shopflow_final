# ============================================================
# ShopFlow - Application Configuration
# Works for: Local, Docker Compose, Docker standalone, Render, Railway
# ============================================================

# Port - Render injects PORT env var, falls back to 9090
server.port=${PORT:9090}
spring.application.name=shopflow

# ============================================================
# DATABASE CONFIGURATION
# When SPRING_DATASOURCE_URL env var is set (Docker Compose / Render / Railway)
#   → uses that value (proper cloud or container DB)
# When NOT set (local dev with MySQL running)
#   → uses localhost
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shopflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ShopFlow@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.max-lifetime=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
